# ─── Wallpaper ───
# arche-wallpaper talks to awww (successor of swww) over its socket IPC.
# It brings the daemon up on first call, so one exec-once is enough — no
# separate awww-daemon line. See D026.

exec-once = arche-wallpaper restore

# ─── Panel / Notifications / OSD / Control Center ───
# DankMaterialShell (dms) ships bar, toasts, control-center, OSD, launcher,
# clipboard, and power menu as one layer. Started via its systemd user service
# (Type=dbus, owns org.freedesktop.Notifications, Restart=on-failure). See D032.

exec-once = systemctl --user start dms.service

# ─── Auth ───

exec-once = systemctl --user start hyprpolkitagent

# ─── Secret service (keyring) ───
# gnome-keyring provides the org.freedesktop.secrets D-Bus service so apps
# (Remmina RDP passwords, libsecret consumers) get encrypted storage instead
# of plaintext. Hyprland has no DE to start it, so launch the daemon here.
exec-once = gnome-keyring-daemon --start --components=secrets,ssh,pkcs11

# ─── Idle ───
# uwsm sessions should run hypridle as a user service. Super+Ctrl+I toggles
# dms's idle inhibitor (dms ipc call inhibit toggle); this service stays up so
# DBus lock and before-sleep hooks remain live.
exec-once = systemctl --user start hypridle.service

# ─── Clipboard ───
# dms runs its own clipboard tracker (Go backend, handles text + images) as
# part of dms.service — it OWNS the clipboard, just as it owns notifications.
# Running cliphist's `wl-paste --watch` alongside meant two managers competing
# for the selection, which dropped image copies (e.g. screenshots). Removed.
# See D032. (Migrate old history once with: dms clipboard import / cliphist-migrate.)
