# ─── Wallpaper ───
# arche-wallpaper owns hyprpaper.conf and launches hyprpaper with a random
# pick on login (hyprctl IPC is too new for Arch's hyprpaper 0.8.3 — see D015)

exec-once = arche-wallpaper random

# ─── Bar ───

exec-once = uwsm-app -- waybar

# ─── Auth ───

exec-once = systemctl --user start hyprpolkitagent

# ─── Notifications ───

exec-once = mako

# ─── OSD ───

exec-once = syshud

# ─── Idle ───

exec-once = uwsm-app -- hypridle

# ─── Clipboard ───

exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
