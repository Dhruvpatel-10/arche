# ─── Wallpaper ───
# arche-wallpaper talks to awww (successor of swww) over its socket IPC.
# It brings the daemon up on first call, so one exec-once is enough — no
# separate awww-daemon line. See D026.

exec-once = arche-wallpaper random

# ─── Panel / Notifications / OSD / Control Center ───
# Quickshell ships bar, toasts, control-center, and OSD as one layer.
# QML source at /opt/arche/shell/ — see D029 (supersedes D023).

exec-once = uwsm-app -- quickshell --no-duplicate -p $HOME/.config/quickshell/shell.qml

# ─── Auth ───

exec-once = systemctl --user start hyprpolkitagent

# ─── Idle ───

exec-once = uwsm-app -- hypridle

# ─── Clipboard ───

exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
