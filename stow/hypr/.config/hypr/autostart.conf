# ─── Wallpaper ───
# swww persists last wallpaper across reboots; random pick on first login

exec-once = swww-daemon
exec-once = sleep 2 && arche-wallpaper random

# ─── Bar ───

exec-once = uwsm-app -- waybar

# ─── Auth ───

exec-once = systemctl --user start hyprpolkitagent

# ─── Notifications ───

exec-once = mako

# ─── OSD ───

exec-once = syshud

# ─── Idle ───

exec-once = uwsm-app -- hypridle

# ─── Clipboard ───

exec-once = wl-paste --watch cliphist store
