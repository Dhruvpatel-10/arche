# ─── Window Management ───

bindd = SUPER, W, Close window, killactive,
bindd = SUPER, J, Toggle window split, layoutmsg, togglesplit
bindd = SUPER, P, Pseudo window, pseudo,
bindd = SUPER, T, Toggle floating, togglefloating,
bindd = SUPER, F, Fullscreen, fullscreen, 0
bindd = SUPER CTRL, F, Tiled fullscreen, fullscreenstate, 0 2
bindd = SUPER ALT, F, Full width, fullscreen, 1

# ─── Focus ───

bindd = SUPER, LEFT, Focus left, movefocus, l
bindd = SUPER, RIGHT, Focus right, movefocus, r
bindd = SUPER, UP, Focus up, movefocus, u
bindd = SUPER, DOWN, Focus down, movefocus, d

# ─── Workspaces ───

bindd = SUPER, code:10, Workspace 1, workspace, 1
bindd = SUPER, code:11, Workspace 2, workspace, 2
bindd = SUPER, code:12, Workspace 3, workspace, 3
bindd = SUPER, code:13, Workspace 4, workspace, 4
bindd = SUPER, code:14, Workspace 5, workspace, 5
bindd = SUPER, code:15, Workspace 6, workspace, 6
bindd = SUPER, code:16, Workspace 7, workspace, 7
bindd = SUPER, code:17, Workspace 8, workspace, 8
bindd = SUPER, code:18, Workspace 9, workspace, 9
bindd = SUPER, code:19, Workspace 10, workspace, 10

bindd = SUPER SHIFT, code:10, Move to workspace 1, movetoworkspace, 1
bindd = SUPER SHIFT, code:11, Move to workspace 2, movetoworkspace, 2
bindd = SUPER SHIFT, code:12, Move to workspace 3, movetoworkspace, 3
bindd = SUPER SHIFT, code:13, Move to workspace 4, movetoworkspace, 4
bindd = SUPER SHIFT, code:14, Move to workspace 5, movetoworkspace, 5
bindd = SUPER SHIFT, code:15, Move to workspace 6, movetoworkspace, 6
bindd = SUPER SHIFT, code:16, Move to workspace 7, movetoworkspace, 7
bindd = SUPER SHIFT, code:17, Move to workspace 8, movetoworkspace, 8
bindd = SUPER SHIFT, code:18, Move to workspace 9, movetoworkspace, 9
bindd = SUPER SHIFT, code:19, Move to workspace 10, movetoworkspace, 10

bindd = SUPER, TAB, Next workspace, workspace, e+1
bindd = SUPER SHIFT, TAB, Previous workspace, workspace, e-1
bindd = SUPER CTRL, TAB, Last workspace, workspace, previous

# ─── Scratchpad ───

bindd = SUPER, S, Toggle scratchpad, togglespecialworkspace, scratchpad
bindd = SUPER ALT, S, Move to scratchpad, movetoworkspacesilent, special:scratchpad

# ─── Swap / Move Windows ───

bindd = SUPER SHIFT, LEFT, Swap left, swapwindow, l
bindd = SUPER SHIFT, RIGHT, Swap right, swapwindow, r
bindd = SUPER SHIFT, UP, Swap up, swapwindow, u
bindd = SUPER SHIFT, DOWN, Swap down, swapwindow, d

# Move workspaces between monitors
bindd = SUPER SHIFT ALT, LEFT, Workspace to left monitor, movecurrentworkspacetomonitor, l
bindd = SUPER SHIFT ALT, RIGHT, Workspace to right monitor, movecurrentworkspacetomonitor, r

# ─── Resize ───

bindd = SUPER, code:20, Shrink width, resizeactive, -100 0
bindd = SUPER, code:21, Grow width, resizeactive, 100 0
bindd = SUPER SHIFT, code:20, Shrink height, resizeactive, 0 -100
bindd = SUPER SHIFT, code:21, Grow height, resizeactive, 0 100

# ─── Mouse ───

bindd = SUPER, mouse_down, Scroll workspace forward, workspace, e+1
bindd = SUPER, mouse_up, Scroll workspace backward, workspace, e-1
bindmd = SUPER, mouse:272, Move window, movewindow
bindmd = SUPER, mouse:273, Resize window, resizewindow

# ─── Alt-Tab ───

bindd = ALT, TAB, Next window, cyclenext
bindd = ALT SHIFT, TAB, Previous window, cyclenext, prev
bindd = ALT, TAB, Bring active to top, bringactivetotop
bindd = ALT SHIFT, TAB, Bring active to top, bringactivetotop

# ─── Groups ───

bindd = SUPER, G, Toggle group, togglegroup
bindd = SUPER ALT, G, Ungroup window, moveoutofgroup
bindd = SUPER ALT, LEFT, Group left, moveintogroup, l
bindd = SUPER ALT, RIGHT, Group right, moveintogroup, r
bindd = SUPER ALT, UP, Group up, moveintogroup, u
bindd = SUPER ALT, DOWN, Group down, moveintogroup, d
bindd = SUPER ALT, TAB, Next in group, changegroupactive, f
bindd = SUPER ALT SHIFT, TAB, Previous in group, changegroupactive, b

# ─── Clipboard ───

bindd = SUPER, C, Copy, sendshortcut, CTRL, Insert,
bindd = SUPER, V, Paste, sendshortcut, SHIFT, Insert,
bindd = SUPER, X, Cut, sendshortcut, CTRL, X,
bindd = SUPER CTRL, V, Clipboard history, exec, rofi -modi clipboard:$HOME/.local/bin/arche/cliphist-rofi-img -show clipboard -show-icons

# ─── Launcher ───

bindd = SUPER, SPACE, Launcher, exec, rofi -show drun
bindd = SUPER CTRL, E, Emoji picker, exec, rofi -show run -run-command "echo {cmd}" -p Emoji
bindd = SUPER, TAB, Window switcher, exec, rofi -show window

# ─── Applications ───

bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- kitty
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- kitty tmux new
bindd = SUPER SHIFT, B, Browser, exec, uwsm-app -- vivaldi-stable
bindd = SUPER SHIFT, N, Editor, exec, uwsm-app -- kitty nvim
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- kitty --class popup -e yazi
bindd = SUPER SHIFT, T, Activity, exec, uwsm-app -- kitty btop
bindd = SUPER SHIFT, D, Docker, exec, uwsm-app -- kitty lazydocker
bindd = SUPER SHIFT, O, Obsidian, exec, uwsm-app -- obsidian --enable-wayland-ime

# Web apps
bindd = SUPER SHIFT, A, ChatGPT, exec, uwsm-app -- chromium --app=https://chatgpt.com
bindd = SUPER SHIFT, Y, YouTube, exec, uwsm-app -- chromium --app=https://youtube.com/

# ─── Screenshots ───

bindd = SUPER ALT, M, Screenshot region, exec, $HOME/.local/bin/arche/arche-screenshot
bindd = SUPER, PRINT, Color picker, exec, pkill hyprpicker || hyprpicker -a
bindd = SUPER SHIFT, PRINT, Screenshot fullscreen, exec, bash -c 'f=$HOME/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png && grim -l 0 "$f" && wl-copy -t image/png < "$f" && notify-send -i "$f" "Screenshot copied" "$f"'

# ─── Utilities ───

bindd = SUPER CTRL, L, Lock, exec, loginctl lock-session
bindd = SUPER CTRL, A, Audio mixer, exec, uwsm-app -- kitty --class popup -e wiremix
bindd = SUPER CTRL, B, Bluetooth, exec, uwsm-app -- kitty --class popup -e bluetui
bindd = SUPER CTRL, W, WiFi, exec, uwsm-app -- kitty --class popup -e impala
bindd = SUPER CTRL, P, Wallpaper picker, exec, uwsm-app -- kitty --class popup -e $HOME/.local/bin/arche/arche-wallpaper
bindd = SUPER CTRL, I, Idle lock toggle, exec, $HOME/.local/bin/arche/arche-toggle-idle
bindd = SUPER CTRL, N, Night light toggle, exec, pkill hyprsunset || hyprsunset -t 4000
bindd = SUPER CTRL, H, HDMI reset, exec, $HOME/.local/bin/arche/arche-hdmi-reset
bindd = SUPER CTRL, G, Legion manager, exec, uwsm-app -- kitty --class popup -e $HOME/.local/bin/arche/arche-legion

# Notifications (mako)
bindd = SUPER, COMMA, Dismiss notification, exec, makoctl dismiss
bindd = SUPER SHIFT, COMMA, Dismiss all, exec, makoctl dismiss -a
bindd = SUPER ALT, COMMA, Toggle DND, exec, makoctl mode -t do-not-disturb

# Waybar toggle
bindd = SUPER SHIFT, SPACE, Toggle bar, exec, pkill waybar || waybar &

# Transparency toggle
bindd = SUPER, BACKSPACE, Toggle transparency, exec, hyprctl dispatch setprop "address:$(hyprctl activewindow -j | jq -r '.address')" opaque toggle

# Keybinding cheatsheet
bindd = SUPER, K, Show keybindings, exec, $HOME/.local/bin/arche/arche-keybindings

# Zoom
bindd = SUPER CTRL, Z, Zoom in, exec, hyprctl keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float + 1')
bindd = SUPER CTRL ALT, Z, Reset zoom, exec, hyprctl keyword cursor:zoom_factor 1

# Time/info
bindd = SUPER CTRL ALT, T, Show time, exec, notify-send "    $(date +"%A %H:%M  —  %d %B W%V %Y")"
