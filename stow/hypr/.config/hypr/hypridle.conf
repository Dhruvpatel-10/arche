general {
    lock_cmd = pidof hyprlock || hyprlock                    # launch hyprlock if not already running
    before_sleep_cmd = loginctl lock-session                 # lock before suspend
    after_sleep_cmd = sleep 1 && hyprctl reload && systemctl --user restart pipewire pipewire-pulse wireplumber  # restore monitors + restart audio
    inhibit_sleep = 3                                        # wait until screen is locked
}

listener {
    timeout = 450                                            # 7m30s — lock screen
    on-timeout = loginctl lock-session
}

# Screen-off via monitor disable, not DPMS. NVIDIA open + Legion eDP has a
# known bug where DPMS off → panel self-refresh sticks and wake returns a
# black screen until hard power-cycle. `hyprctl keyword monitor NAME,disable`
# releases the KMS connector entirely (different code path), and `hyprctl
# reload` re-applies monitors.conf cleanly on any input activity.
listener {
    timeout = 600                                            # 10min — tear down monitors
    on-timeout = hyprctl -j monitors | jq -r '.[].name' | xargs -I{} hyprctl keyword monitor "{},disable"
    on-resume = hyprctl reload
}
