source = $HOME/.config/hypr/hyprlock-colors.conf
source = $HOME/.config/hypr/hyprlock-fonts.conf

general {
    ignore_empty_input = true
    hide_cursor = true
}

background {
    monitor =
    color = $color
    blur_passes = 4
    blur_size = 6
    noise = 0.02
    brightness = 0.6
}

animations {
    enabled = true
    bezier = fadeIn, 0.05, 0.9, 0.1, 1.0
    animation = fadeIn, 1, 3, fadeIn
}

# ─── Time ───

label {
    monitor =
    text = $TIME
    font_family = $font_sans
    font_size = 96
    color = $font_color

    position = 0, 180
    halign = center
    valign = center

    shadow_passes = 1
    shadow_size = 6
    shadow_boost = 0.4
}

# ─── Date ───

label {
    monitor =
    text = cmd[update:60000] date +"%A, %B %d"
    font_family = $font_sans
    font_size = 20
    color = $font_muted

    position = 0, 100
    halign = center
    valign = center

    shadow_passes = 0
}

# ─── Input ───

input-field {
    monitor =
    size = 320, 48
    position = 0, -40
    halign = center
    valign = center

    inner_color = $inner_color
    outer_color = $outer_color
    outline_thickness = 2

    font_family = $font_mono
    font_size = 14
    font_color = $font_color

    placeholder_text =
    check_color = $check_color
    fail_color = $fail_color
    fail_text = <i>$FAIL ($ATTEMPTS)</i>

    rounding = 24
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    dots_rounding = -1

    shadow_passes = 1
    shadow_size = 4
    shadow_boost = 0.3

    fade_on_empty = false
    fade_timeout = 2000
}

auth {
    fingerprint:enabled = false
}
