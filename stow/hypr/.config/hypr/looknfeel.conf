# Look and feel overrides

general {
    border_size = 1
    gaps_in = 0
    gaps_out = 0
}

decoration {
    # rounding = 8

    blur {
        enabled = true
        size = 8
        passes = 3
        noise = 0.02
        contrast = 1.0
        brightness = 1.0
        vibrancy = 0.2
        popups = true
    }

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(00000055)
    }
}

# ─── Animations: Apple-style motion ───
#
# Apple's rules: 200-350ms durations, aggressive ease-out (object reaches
# ~90% of target in the first 40% of time), slight overshoot on open,
# clean exit on close, fade-out faster than fade-in.

animations {
    enabled = true

    # Apple default — quick start, long gentle deceleration
    bezier = apple, 0.25, 0.1, 0.25, 1.0

    # Snappy ease-out — the core "Apple feel"
    bezier = apple_snappy, 0.2, 0.9, 0.3, 1.0

    # Subtle overshoot for open (mimics spring physics)
    bezier = apple_pop, 0.175, 0.885, 0.32, 1.275

    # Smooth fade curve
    bezier = apple_fade, 0.22, 1.0, 0.36, 1.0

    # Windows: 150ms open with pop, 120ms close — near-instant
    animation = windowsIn, 1, 1.5, apple_pop, popin 95%
    animation = windowsOut, 1, 1.2, apple_snappy, popin 95%
    animation = windowsMove, 1, 1.5, apple_snappy

    # Fades: in 150ms, out 100ms (exits are faster)
    animation = fadeIn, 1, 1.5, apple_fade
    animation = fadeOut, 1, 1, apple_fade

    # Walker: near-instant fade
    animation = fadeLayersIn, 1, 0.8, apple_fade
    animation = fadeLayersOut, 1, 0.5, apple_fade
    animation = fadeSwitch, 1, 1, apple
    animation = fadeShadow, 1, 1.5, apple
    animation = fadeDim, 1, 2, apple

    # Layers (menus, popups, notifications): 150ms
    animation = layers, 1, 1.5, apple_snappy, slide

    # Border color transition
    animation = border, 1, 3, apple

    # Workspace switch: 200ms slide
    animation = workspaces, 1, 2, apple_snappy, slide

    # Scratchpad: 180ms vertical slide
    animation = specialWorkspace, 1, 1.8, apple_snappy, slidevert
}

# ─── Layer rules ───

# Waybar: translucent glass blur
layerrule = blur 1, match:namespace waybar
layerrule = xray 0, match:namespace waybar

# Rofi: Spotlight-style frosted glass
layerrule = animation fade, match:namespace rofi
layerrule = blur 1, match:namespace rofi
layerrule = xray 0, match:namespace rofi

# Mako: frosted glass notification cards
layerrule = blur 1, match:namespace notifications
layerrule = xray 0, match:namespace notifications

# Syshud: frosted glass OSD
layerrule = blur 1, match:namespace syshud
layerrule = xray 0, match:namespace syshud
layerrule = ignore_alpha 0.3, match:namespace syshud

# Screenshot: instant appear — no slide/fade
layerrule = no_anim 1, match:namespace wayfreeze
layerrule = no_anim 1, match:namespace selection
