# Media keys — volume, brightness, playback.
# Volume/brightness go through dms IPC: dms sets the value AND pops its own OSD
# (D032). No separate OSD ping needed.

# Volume
bindld = , XF86AudioRaiseVolume, Volume up, exec, dms ipc call audio increment 5
bindld = , XF86AudioLowerVolume, Volume down, exec, dms ipc call audio decrement 5
bindld = , XF86AudioMute, Mute, exec, dms ipc call audio mute
bindeld = , XF86AudioMicMute, Mic mute, exec, dms ipc call audio micmute
bindld = SUPER, XF86AudioMute, Switch audio output, exec, dms ipc call audio cycleoutput

# Brightness
bindeld = , XF86MonBrightnessUp, Brightness up, exec, dms ipc call brightness increment 5
bindeld = , XF86MonBrightnessDown, Brightness down, exec, dms ipc call brightness decrement 5

# Keyboard backlight
bindeld = , XF86KbdBrightnessUp, Kbd brightness up, exec, brightnessctl -d '*::kbd_backlight' set +33%
bindeld = , XF86KbdBrightnessDown, Kbd brightness down, exec, brightnessctl -d '*::kbd_backlight' set 33%-

# Media playback (playerctl)
bindld = , XF86AudioNext, Next track, exec, playerctl next
bindld = , XF86AudioPause, Pause, exec, playerctl play-pause
bindld = , XF86AudioPlay, Play/Pause, exec, playerctl play-pause
bindld = , XF86AudioPrev, Previous track, exec, playerctl previous
