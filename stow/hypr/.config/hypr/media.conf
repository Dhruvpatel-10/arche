# Media keys — volume, brightness, playback
# Syshud auto-detects wireplumber/backlight changes — keybinds just control the system

# Volume (hard cap at 100%)
bindld = , XF86AudioRaiseVolume, Volume up, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
bindld = , XF86AudioLowerVolume, Volume down, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindld = , XF86AudioMute, Mute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindeld = , XF86AudioMicMute, Mic mute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindld = SUPER, XF86AudioMute, Switch audio output, exec, $HOME/.local/bin/arche/arche-audio-switch

# Brightness
bindeld = , XF86MonBrightnessUp, Brightness up, exec, brightnessctl set 5%+
bindeld = , XF86MonBrightnessDown, Brightness down, exec, brightnessctl set 5%-

# Keyboard backlight
bindeld = , XF86KbdBrightnessUp, Kbd brightness up, exec, brightnessctl -d '*::kbd_backlight' set +33%
bindeld = , XF86KbdBrightnessDown, Kbd brightness down, exec, brightnessctl -d '*::kbd_backlight' set 33%-

# Media playback (playerctl)
bindld = , XF86AudioNext, Next track, exec, playerctl next
bindld = , XF86AudioPause, Pause, exec, playerctl play-pause
bindld = , XF86AudioPlay, Play/Pause, exec, playerctl play-pause
bindld = , XF86AudioPrev, Previous track, exec, playerctl previous
