# Window rules

windowrule = suppress_event maximize, match:class .*

# Default opacity
windowrule = tag +default-opacity, match:class .*
windowrule = opacity 0.97 0.9, match:tag default-opacity

# ─── Popup convention ───
# Any window with class "popup" gets floating + centered at standard size.
# Usage: kitty --class popup -e arche-legion
# To add a new popup TUI, just use --class popup — no rule changes needed.
$popup_w = 900
$popup_h = 620

windowrule = float on, match:class ^popup$
windowrule = size $popup_w $popup_h, match:class ^popup$
windowrule = center on, match:class ^popup$

# ─── App-specific floating windows ───

# Image viewer
windowrule = float on, match:class imv
windowrule = size 1100 800, match:class imv
windowrule = center on, match:class imv

# Document viewer
windowrule = float on, match:class org.pwmt.zathura
windowrule = size 1000 800, match:class org.pwmt.zathura
windowrule = center on, match:class org.pwmt.zathura

# File picker (xdg-desktop-portal-kde)
windowrule = float on, match:class org.freedesktop.impl.portal.desktop.kde
windowrule = size $popup_w $popup_h, match:class org.freedesktop.impl.portal.desktop.kde
windowrule = center on, match:class org.freedesktop.impl.portal.desktop.kde

# Vivaldi — disable compositor effects for performance
windowrule = tag -default-opacity, match:class vivaldi
windowrule = decorate 0, match:class vivaldi

# Satty screenshot editor — floating centered
windowrule = float on, match:class com.gabm.satty
windowrule = size 1100 800, match:class com.gabm.satty
windowrule = center on, match:class com.gabm.satty

# Fix XWayland drag issues
windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0
