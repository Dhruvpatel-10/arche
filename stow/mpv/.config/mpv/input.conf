# ── Navigation ──
PGUP        add chapter 1
PGDWN       add chapter -1

# ── Playback ──
Q           quit
q           quit-watch-later

# ── General ──
k           cycle ontop

# ── Video ──
d           cycle deband
D           cycle deinterlace
n           cycle video-unscaled
C           cycle-values video-aspect-override "16:9" "4:3" "2.35:1" "-1"

# ── Audio ──
a           cycle audio
A           cycle audio down
WHEEL_UP    add volume 2
WHEEL_DOWN  add volume -2
UP          add volume 2
DOWN        add volume -2
x           add audio-delay -0.05
X           add audio-delay +0.05

# ── Subtitles ──
Shift+g     add sub-scale +0.05
Shift+f     add sub-scale -0.05
ctrl+g      add sub-pos +2
ctrl+f      add sub-pos -2
E           add sub-gauss +0.1
R           add sub-gauss -0.1
z           add sub-delay -0.05
Z           add sub-delay +0.05
u           cycle sub-gray
U           cycle blend-subtitles
p           cycle sub-fix-timing
g           sub-reload
l           cycle-values sub-ass-override "yes" "force" "no"

# ── Scripts ──
~           script-message cycle-commands "apply-profile HDR ; show-text 'HDR profile applied'" "apply-profile HDR restore ; show-text 'HDR profile restored'"
c           script-binding cycle-visualizer
b           script-binding set_gif_start
B           script-binding set_gif_end
ctrl+b      script-binding make_gif
ctrl+B      script-binding make_gif_with_subtitles
ctrl+c      script-binding copy-time
ctrl+S      script-binding toggle-seeker
ctrl+v      script-binding paste-timestamp
alt+b       script-binding sponsorblock
