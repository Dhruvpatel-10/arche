# ── Video Output ──

vo=gpu-next                             # modern renderer — required for HDR passthrough, better shaders
gpu-api=vulkan                          # best performance on RTX 4060 + Wayland
gpu-context=waylandvk                   # explicit Wayland Vulkan context
hwdec=auto-safe                         # hardware decode, skip known-broken codecs
gpu-shader-cache-dir=~/.cache/mpv/shader-cache

profile=high-quality                    # ewa_lanczossharp, hdr-peak-percentile=99.995, deband=yes
fullscreen=yes
force-seekable=yes
keep-open=always
reset-on-next-file=pause

# ── Scaling & Shaders ──
# FSRCNNX: neural network luma upscaler (1080p→4K on RTX 4060, no sweat)
# KrigBilateral: chroma upscaler — fixes 4:2:0 subsampling artifacts
# SSimDownscaler: perceptually optimized downscaler for native 4K content
glsl-shaders=~/.config/mpv/shaders/FSRCNNX_x2_16-0-4-1.glsl:~/.config/mpv/shaders/KrigBilateral.glsl:~/.config/mpv/shaders/SSimDownscaler.glsl
sigmoid-upscaling=yes
correct-downscaling=yes
linear-downscaling=no                   # required when using SSimDownscaler

# ── Interpolation ──
# Both displays are high-refresh (160Hz/240Hz) — interpolation eliminates
# judder from 24/30fps content. oversample avoids ghosting artifacts.
video-sync=display-resample
interpolation=yes
tscale=oversample

# ── HDR ──
# Both panels support HDR10 (ST2084, ~497 nits, 10-bit, BT.2020)
target-colorspace-hint=yes              # passthrough HDR metadata to display
hdr-compute-peak=yes                    # dynamic scene peak detection
tone-mapping=bt.2390                    # best general-purpose tone mapper
tone-mapping-param=1.0
gamut-mapping-mode=perceptual

# ── Dithering ──
dither-depth=auto                       # both panels are 10-bit — dither to match

# ── Debanding ──
deband=no                               # toggle with 'd' for banded content
deband-iterations=2
deband-threshold=64
deband-range=17
deband-grain=12

# ── Audio ──
volume=100
volume-max=200
audio-file-auto=fuzzy                   # load external audio with similar filename
audio-pitch-correction=yes              # maintain pitch during speed changes
audio-channels=auto                     # let pipewire negotiate best channel layout
audio-samplerate=48000                  # match pipewire native rate (avoids resampling)
audio-normalize-downmix=yes             # prevent clipping on surround→stereo downmix
af=lavfi=[acompressor=ratio=4:attack=20:release=250:threshold=-20dB:makeup=2dB]
# ^^ light dynamic range compression — evens out loud/quiet in movies

# ── Cache ──
cache=yes
demuxer-max-bytes=512MiB                # large read-ahead for 4K HEVC/AV1 content
demuxer-max-back-bytes=128MiB           # keep decoded frames for backward seeking

# ── Watch Later ──
watch-later-dir=~/.local/state/mpv/watch-later
write-filename-in-watch-later-config=yes

# ── OSD / OSC ──
osd-bar=no
osc=no                                  # custom OSC (modernx.lua)
border=yes
cursor-autohide-fs-only=yes
cursor-autohide=300
osd-level=1
osd-duration=1000
hr-seek=yes

include=~/.config/mpv/font-opts.conf
osd-font-size=20
osd-color='#FFFFFF'
osd-border-color='#000000'
osd-border-size=0.6
osd-blur=0.2

# ── Language Priority ──
alang=ja,jp,jpn,en,eng
slang=en,eng

# ── Subtitles ──
demuxer-mkv-subtitle-preroll=yes
sub-fix-timing=no
sub-auto=fuzzy
blend-subtitles=video                   # render subs into video before upscaling — cleaner with HDR
sub-font='Netflix Sans Medium'
sub-font-size=32
sub-color='#FFFFFFFF'
sub-border-color='#FF000000'
sub-border-size=2.0
sub-shadow-offset=0
sub-spacing=0.0

# ── Screenshots ──
screenshot-format=png
screenshot-high-bit-depth=yes
screenshot-png-compression=1
screenshot-directory=~/Pictures/mpv-screenshots
screenshot-template="%f-%wH.%wM.%wS.%wT-#%#00n"

# ── Profiles ──

[HDR]
    profile-desc=HDR content — explicit peak mapping
    profile-restore=copy-equal
    tone-mapping=bt.2390
    hdr-compute-peak=yes
    blend-subtitles=video

[WEB-DL]
    profile-desc=WEB-DL Anime (auto-deband for common release groups)
    profile-cond=string.match(p.filename, "HatSubs")~=nil or string.match(p.filename, "SubsPlease")~=nil or string.match(p.filename, "HorribleSubs")~=nil or string.match(p.filename, "Erai%-raws")~=nil
    deband=yes
