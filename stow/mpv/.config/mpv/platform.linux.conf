# platform.linux.conf — GPU backend for Linux (Wayland + NVIDIA RTX 4060).
# Selected by symlinking this to ~/.config/mpv/platform.conf (done by
# scripts/09-apps.sh). Included early by mpv.conf's video-output block.

gpu-api=vulkan                          # best performance on RTX 4060 + Wayland
gpu-context=waylandvk                   # explicit Wayland Vulkan context

# Audio: pin to pipewire's native graph rate so the server never resamples.
audio-samplerate=48000
