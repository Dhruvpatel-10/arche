# platform.macos.conf — GPU backend for macOS / Apple Silicon (M-series).
# Selected by symlinking this to ~/.config/mpv/platform.conf (done by
# macos/bootstrap.sh). Included early by mpv.conf's video-output block.
#
# The Homebrew mpv formula is built against MoltenVK, so its only GPU API is
# Vulkan — routed onto Apple's Metal via MoltenVK (`macvk` context). This is
# the native, fully GPU-accelerated path on the M-series: gpu-next/libplacebo
# drives every GLSL shader (ArtCNN, CfL, SSim), 10-bit output, and HDR
# passthrough via the display's EDR. (There is no OpenGL backend in this build.)

gpu-api=vulkan                          # only API in this build — Metal-backed via MoltenVK
gpu-context=macvk                       # mac/Vulkan via Metal
# hwdec is set in mpv.conf (auto-safe → VideoToolbox on Apple Silicon)

# Fullscreen: mpv.conf sets fullscreen=yes. macOS's *native* fullscreen moves
# the window into its own Space with a slow ~0.7s animated transition on every
# launch — that is the "opening feels laggy" hitch. native-fs=no uses a
# borderless window that instantly covers the screen (menu bar auto-hides)
# instead, so a video opens fullscreen with no space animation. Also kill the
# residual animation duration as a belt-and-suspenders.
native-fs=no
macos-fs-animation-duration=0

# OSD font: the theme's FONT_SANS is "SF Pro Text", which is not an addressable
# font family on macOS — libass (via its CoreText provider) can not resolve it
# and silently falls back to Helvetica. Point the OSD at Helvetica Neue instead:
# a genuine macOS system font that resolves straight to the OS file
# (/System/Library/Fonts/HelveticaNeue.ttc), with nothing bundled into the repo.
# Included after font-opts.conf, so it wins.
osd-font='Helvetica Neue'

# Audio: deliberately DO NOT set audio-samplerate here. CoreAudio drives the
# device at its own native rate (44.1k on most DACs/headphones, 48k on others);
# forcing 48k like the Linux/pipewire path would make mpv resample up, then
# CoreAudio resample back down — two conversions instead of none. Leaving it
# unset lets mpv hand the source stream to CoreAudio for a single, device-rate
# conversion (or none, when they already match).
