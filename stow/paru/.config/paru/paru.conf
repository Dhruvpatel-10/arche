# ~/.config/paru/paru.conf — managed by arche (stowed)
#
# Security-focused AUR helper config.
# PKGBUILDs are ALWAYS reviewed before building — never skipped.

[options]
# ─── Review & Audit ───

# Show PKGBUILD diff on upgrades (highlight what changed since last install).
# This is your primary defense against supply chain attacks in AUR.
# If a maintainer injects malicious code, the diff will show it.

# Do NOT add SkipReview here. Ever.

# ─── Build Safety ───

# Remove build-only dependencies after install (reduces attack surface)
RemoveMake

# Stop immediately if any AUR package fails to build
FailFast

# Clean untracked files from build dir after install
CleanAfter

# ─── UX ───

# Print search results bottom-to-top (newest/best match at bottom, near prompt)
BottomUp

# Show detailed upgrade menu before proceeding
UpgradeMenu

# Periodically refresh sudo during long builds so it doesn't time out
SudoLoop
