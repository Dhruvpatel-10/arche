# BlueZ monitor properties — codec selection, HFP backend, quality flags
monitor.bluez.properties = {
  bluez5.roles            = [ a2dp_sink a2dp_source bap_sink bap_source hfp_hf hfp_ag ]
  bluez5.codecs           = [ ldac aac aptx_hd aptx sbc_xq sbc faststream faststream_duplex ]
  bluez5.enable-sbc-xq    = true
  bluez5.enable-msbc       = true
  bluez5.enable-hw-volume  = true
  bluez5.hfphsp-backend    = "native"
  bluez5.default.rate      = 48000
  bluez5.default.channels  = 2
}

# Per-device and per-node rules
monitor.bluez.rules = [
  {
    matches = [
      {
        device.name = "~bluez_card.*"
      }
    ]
    actions = {
      update-props = {
        bluez5.auto-connect          = [ a2dp_sink a2dp_source hfp_hf hfp_ag ]
        bluez5.hw-volume             = [ a2dp_sink hfp_hf hsp_hs a2dp_source hfp_ag hsp_ag ]
        bluez5.a2dp.ldac.quality     = "auto"
        bluez5.a2dp.aac.bitratemode  = 0
      }
    }
  }
  {
    matches = [
      {
        node.name = "~bluez_output.*"
      }
      {
        node.name = "~bluez_input.*"
      }
    ]
    actions = {
      update-props = {
        node.pause-on-idle              = false
        session.suspend-timeout-seconds = 0
        resample.quality                = 4
      }
    }
  }
]
