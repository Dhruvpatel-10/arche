# keymap.toml — custom keybindings (prepended to defaults)

[mgr]
prepend_keymap = [
    # Smart enter — enter dir or open file with one key
    { on = "l", run = "plugin smart-enter", desc = "Enter dir or open file" },
    { on = "<Enter>", run = "plugin smart-enter", desc = "Enter dir or open file" },

    # Jump to char — vim f-motion for files
    { on = "f", run = "plugin jump-to-char", desc = "Jump to file by char" },

    # Toggle preview pane
    { on = "T", run = "plugin toggle-pane --args=min-preview", desc = "Toggle preview" },

    # Drag and drop to GUI apps
    { on = "<C-d>", run = "plugin drag", desc = "Drag and drop" },

    # Diff selected vs hovered
    { on = "<C-x>", run = "plugin diff", desc = "Diff files" },

    # Smart paste — into hovered dir, not CWD
    { on = "P", run = "plugin smart-paste", desc = "Paste into hovered dir" },

    # Quick directory jumps
    { on = ["g", "d"], run = "cd ~/dev", desc = "Go to ~/dev" },
    { on = ["g", "D"], run = "cd ~/Downloads", desc = "Go to ~/Downloads" },
    { on = ["g", "c"], run = "cd ~/.config", desc = "Go to ~/.config" },
    { on = ["g", "a"], run = "cd ~/arche", desc = "Go to ~/arche" },
    { on = ["g", "p"], run = "cd ~/Pictures", desc = "Go to ~/Pictures" },
]
