# yazi.toml — behavior config

[mgr]
ratio = [1, 3, 4]
show_hidden = true
sort_by = "natural"
sort_dir_first = true
sort_sensitive = false
linemode = "size"

# ─── Openers ───

[opener]
markdown = [
    { run = 'kitty --class popup -e glow-view %s', orphan = true, desc = "View in Glow" },
    { run = '$EDITOR %s', block = true, desc = "Edit in $EDITOR" },
]

# ─── File type rules ───

[[open.prepend_rules]]
mime = "text/markdown"
use = "markdown"

[[open.prepend_rules]]
url = "*.md"
use = "markdown"

[[open.prepend_rules]]
url = "*.markdown"
use = "markdown"

[preview]
max_width = 1000
max_height = 1000

# ─── Plugin fetchers (git status in file list) ───

[[plugin.prepend_fetchers]]
id = "git"
name = "*"
run = "git"

[[plugin.prepend_fetchers]]
id = "git"
name = "*/"
run = "git"
