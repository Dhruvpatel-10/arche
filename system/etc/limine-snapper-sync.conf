# limine-snapper-sync — snapshot boot entry config
# Managed by arche (symlinked by scripts/00-preflight.sh)
#
# Values shared with /etc/default/limine:
#   MAX_SNAPSHOT_ENTRIES, SNAPSHOT_FORMAT_CHOICE
# Keep both files in sync — both live under system/etc/ in arche.

# ─── Boot Partition Limits ───

# Max % of FAT32 boot partition before refusing new snapshot entries
LIMIT_USAGE_PERCENT=85

# Max snapshot entries in the "Snapshots" boot menu
MAX_SNAPSHOT_ENTRIES=5

# ─── Snapshot Entry Format ───
# 0: ID=111 2023-12-20 10:59:59   2: 111 | 2023-12-20 10:59:59
# 5: 2023-12-20 10:59:59          7: 111|snapshot description
SNAPSHOT_FORMAT_CHOICE=5

# ─── Btrfs Layout ───

ROOT_SUBVOLUME_PATH="/@"
ROOT_SNAPSHOTS_PATH="/@/.snapshots"

# ─── Restore ───

# "replace" is fast and correct for Arch (creates new subvolume from snapshot)
RESTORE_METHOD=replace
SET_SNAPSHOT_AS_DEFAULT=no

# ─── Limine Secure Boot ───

COMMANDS_BEFORE_SAVE="limine-reset-enroll"
COMMANDS_AFTER_SAVE="limine-enroll-config"

# ─── Notifications ───

NOTIFICATION_ICON="/usr/share/icons/hicolor/128x128/apps/LimineSnapperSync.png"
