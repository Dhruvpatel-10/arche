# /etc/mkinitcpio.conf.d/arche.conf — managed by arche (symlinked by link_system_all)
#
# Overrides HOOKS from /etc/mkinitcpio.conf to use systemd-based early userspace,
# Plymouth splash, and sd-encrypt (TPM2-capable LUKS unlock). See D024.
#
# Ordering rules:
#   · `systemd` replaces `udev` — required for sd-encrypt and systemd-cryptsetup.
#   · `kms` comes before `plymouth` so the framebuffer is ready.
#   · `plymouth` comes before `sd-encrypt` so its password agent is already
#     registered when systemd-cryptsetup asks for the PIN.
#   · `sd-vconsole` replaces the older `keymap` + `consolefont` pair.

HOOKS=(base systemd autodetect microcode modconf kms keyboard sd-vconsole block plymouth sd-encrypt filesystems fsck)
