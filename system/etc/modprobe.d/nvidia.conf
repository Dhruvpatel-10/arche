# NVIDIA — preserve VRAM across DPMS off, suspend, hibernate.
#
# Without this, the eDP panel framebuffer is lost the moment displays power
# down (hypridle dpms off, or systemd suspend), and wake renders a black
# screen that only a hard power-cycle clears. Pairs with nvidia-suspend /
# nvidia-resume / nvidia-hibernate services, which save/restore the VRAM
# blob to disk using this path.
#
# Applies to Turing+ (RTX 4060 Laptop qualifies).
options nvidia NVreg_PreserveVideoMemoryAllocations=1
options nvidia NVreg_TemporaryFilePath=/var/tmp
