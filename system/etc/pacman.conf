# /etc/pacman.conf — managed by arche (symlinked by scripts/00-preflight.sh)
# See pacman.conf(5) for details.

[options]
Color
ILoveCandy
VerbosePkgLists
HoldPkg     = pacman glibc
Architecture = auto
CheckSpace
ParallelDownloads = 10
DownloadUser = alpm

# Signature verification
SigLevel = Required DatabaseOptional
LocalFileSigLevel = Optional

# ─── Repositories ───

[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

[multilib]
Include = /etc/pacman.d/mirrorlist
