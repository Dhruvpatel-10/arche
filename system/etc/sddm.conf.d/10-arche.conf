# /etc/sddm.conf.d/10-arche.conf — managed by arche (symlinked by link_system_all)
#
# SDDM configuration for arche.
# X11 greeter (stable, multi-monitor native) with the vendored eucalyptus-drop
# theme. Wayland sessions (Hyprland) launch fine from an X11 greeter — SDDM
# just starts the session, it does not care which display server the user
# session uses. See docs/decisions.md D013.

[General]
DisplayServer=x11
InputMethod=

[Theme]
# Vendored SilentSDDM (see D013). To switch the visual variant, edit
# /usr/share/sddm/themes/silent/metadata.desktop and change the active
# ConfigFile= line — the theme ships ~13 variants (default, catppuccin-mocha,
# nord, everforest, etc.). No SDDM restart needed; takes effect on next login.
Current=silent
CursorTheme=Bibata-Modern-Classic
CursorSize=24
Font=Red Hat Display

[Users]
# Show real human accounts only — hide system users from the dropdown.
MaximumUid=60000
MinimumUid=1000
HideShells=/usr/bin/nologin,/sbin/nologin,/bin/false
RememberLastUser=true
RememberLastSession=true

[X11]
EnableHiDPI=true
SessionDir=/usr/share/xsessions
# ServerArguments left default. SDDM auto-detects monitors and places the
# greeter on the primary output. Override here only if you need a specific
# monitor layout at greeter time.

[Wayland]
# Unused (greeter is X11) — but session launching still reads this.
SessionDir=/usr/share/wayland-sessions
EnableHiDPI=true
