# /etc/sddm.conf.d/10-arche.conf — managed by arche (symlinked by link_system_all)
#
# SDDM configuration for arche (Hyprland + Quickshell stack — see D023).
# X11 greeter (stable, multi-monitor native). Wayland sessions (Hyprland via
# uwsm) launch fine from an X11 greeter — SDDM just hands off, it does not
# care which display server the user session uses.

[General]
DisplayServer=x11
InputMethod=

[Theme]
# Custom arche theme — minimal multiuser card layout using the ember palette.
# Source lives in system/usr/share/sddm/themes/arche/ and is symlinked into
# /usr/share/sddm/themes/arche/ by link_system_all.
Current=arche
CursorTheme=Bibata-Modern-Classic
CursorSize=24
Font=IBM Plex Sans

[Users]
# Show real human accounts only — hide system users from the dropdown.
MaximumUid=60000
MinimumUid=1000
HideShells=/usr/bin/nologin,/sbin/nologin,/bin/false
RememberLastUser=true
RememberLastSession=true

[X11]
EnableHiDPI=true
SessionDir=/usr/share/xsessions

[Wayland]
# Unused (greeter is X11) — but session launching still reads this.
SessionDir=/usr/share/wayland-sessions
EnableHiDPI=true
