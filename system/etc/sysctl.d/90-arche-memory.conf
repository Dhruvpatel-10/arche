# /etc/sysctl.d/90-arche-memory.conf — managed by arche
# Memory reclaim tuning + manual-recovery SysRq for a 16 GiB Legion workstation
# running Hyprland, rust cargo builds, ollama, and Docker.

# ─── Reclaim smoothness ───

# Wake kswapd earlier. Default 10 means the kernel only starts background
# reclaim when free RAM drops below ~0.1% — by then allocations stall briefly
# (the "system froze for 2s" moment during cargo link / ollama model load).
# 125 = reclaim starts at ~1.25% free, giving headroom so foreground allocs
# never block on reclaim. Costs ~200 MB of RAM held back as cushion.
vm.watermark_scale_factor = 125

# Bias reclaim toward anon pages (swap to fast zstd-zram at prio 100) over
# dropping file cache. Default 60 tuned for slow spinning-disk swap; zram
# inverts that calculus. 100 = mild anon-bias — fills zram first, but doesn't
# aggressively push pages into the slow btrfs disk swapfile once zram is full.
# Previously 150: under heavy build load (cargo + many parallel rustc link
# jobs) that pushed pages to disk swap so fast that btrfs CoW thrashed and
# the kernel was too busy doing swap I/O to schedule oomd, freezing the box.
vm.swappiness = 100

# zram serves page faults faster than the kernel can prefetch. Default 3
# (read 8 pages at once) wastes zram bandwidth. 0 = single-page reads, which
# matches how zram actually performs best.
vm.page-cluster = 0

# ─── Manual recovery backstop ───

# Enable SysRq keys needed for REISUB + manual OOM kill.
# Bitmask 244 = 4 (unraw keyboard 'r') + 16 (sync 's') + 32 (remount-ro 'u')
# + 64 (signal processes 'e'/'i'/'f') + 128 (reboot 'b'/'o').
# Excludes 8 (debug dumps) and 256 (RT nice) to avoid info leaks.
#
# If the compositor wedges: hold Alt+SysRq and press R-E-I-S-U-B slowly
# (one key per second). Alt+SysRq+F manually triggers OOM kill of the
# fattest process — useful if userspace oomd itself is starved.
kernel.sysrq = 244
