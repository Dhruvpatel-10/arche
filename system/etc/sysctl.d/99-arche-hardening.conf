# /etc/sysctl.d/99-arche-hardening.conf — managed by arche
# Kernel and network hardening for a personal workstation.
# Applied at boot by systemd-sysctl. Reload with: sudo sysctl --system

# ─── Network ───

# SYN flood protection
net.ipv4.tcp_syncookies = 1

# Reverse path filtering — drop packets with spoofed source IPs
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# Ignore ICMP redirects — prevents MITM route injection
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0

# Don't send ICMP redirects — we're not a router
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# Reject source-routed packets
net.ipv4.conf.all.accept_source_route = 0
net.ipv6.conf.all.accept_source_route = 0

# Ignore broadcast pings (Smurf attack mitigation)
net.ipv4.icmp_echo_ignore_broadcasts = 1

# Log suspicious packets (martians)
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

# ─── Kernel ───

# Hide kernel pointers from non-root (info leak prevention)
kernel.kptr_restrict = 2

# Restrict dmesg to root (kernel log may contain addresses/secrets)
kernel.dmesg_restrict = 1

# Restrict ptrace to parent process only (anti-debugging/injection)
kernel.yama.ptrace_scope = 1

# Disable unprivileged BPF and harden JIT (prevents BPF exploits)
kernel.unprivileged_bpf_disabled = 1
net.core.bpf_jit_harden = 2

# ─── Filesystem ───

# Protect hardlinks and symlinks from abuse
fs.protected_hardlinks = 1
fs.protected_symlinks = 1

# Disable core dumps for setuid binaries (prevents credential leaks)
fs.suid_dumpable = 0

# ─── Terminal ───

# Disable legacy TIOCSTI ioctl (prevents terminal input injection)
# Mitigates sandbox escape via character injection into parent terminal.
# Available since Linux 6.2. Firejail + seccomp also blocks this,
# but belt-and-suspenders at the kernel level is free.
dev.tty.legacy_tiocsti = 0
