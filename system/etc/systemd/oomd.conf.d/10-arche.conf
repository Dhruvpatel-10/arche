[OOM]
# PSI memory pressure must stay above slice limit for this duration before oomd
# acts. Tuned for heavy workstation use — cargo link jobs, rustc codegen bursts,
# ollama model loads, and test runs commonly push PSI to 40-55% for 15-25s.
# 20s skips those transients but reacts before swap thrash freezes the box.
# Was 30s — combined with no ManagedOOMSwap=kill on user-.slice, that lost the
# race against btrfs swap I/O during big rustc parallel link jobs.
DefaultMemoryPressureDurationSec=20s

# When total swap (zram + disk) usage exceeds this, oomd kills the fattest
# cgroup in any slice that opts in via ManagedOOMSwap=kill. user-.slice opts
# in (50-arche-oomd.conf) — that's the fence that catches runaway builds
# before the kernel disappears into btrfs swap I/O thrash.
SwapUsedLimit=90%
