# Drop-in for per-user slices (user-UID.slice). Applies to stark, leanscale,
# any secondary user. Three-layer protection tuned for heavy dev work
# (cargo/rustc, ollama, test suites) — forgiving of transient bursts,
# decisive on genuinely stuck states. SSH stays alive because a session-N.scope
# (~50 MB shell) is never the fattest cgroup picked by oomd; the build scope
# (multi-GB rustc link tree) is what dies.
#
#   1. MemoryHigh=85%  — soft cap. Kernel throttles + aggressively reclaims
#      (anon → zram) when combined user processes exceed ~13 GiB of 15 GiB RAM.
#      No kill yet. Builds keep running; link jobs slow as pages page out.
#
#   2. ManagedOOMSwap=kill — total swap (zram + disk swapfile) past
#      SwapUsedLimit (90%, in /etc/systemd/oomd.conf.d/10-arche.conf) triggers
#      oomd to SIGKILL the fattest cgroup in this slice. This is the fence
#      that catches the actual freeze mode: zram-full → kernel paging into
#      slow btrfs swap → kernel too busy doing swap I/O to schedule oomd.
#      Without this opt-in the global SwapUsedLimit was advisory only and
#      runaway builds drained all 12 GiB of swap before anything reacted.
#
#   3. ManagedOOMMemoryPressure=kill at 60% for 20s (PSI duration set in
#      oomd.conf.d/10-arche.conf). Catches stuck-but-not-yet-swapped states:
#      single huge alloc that pegs PSI without filling swap. 60%/20s = "really
#      stuck, not just busy" (rustc/ollama bursts hit 40-55% for 15-25s).
#
# Kernel OOM killer remains as last-resort backstop if oomd misses entirely.

[Slice]
MemoryHigh=85%
ManagedOOMSwap=kill
ManagedOOMMemoryPressure=kill
ManagedOOMMemoryPressureLimit=60%
